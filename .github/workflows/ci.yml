name: CI

on:
  push:
    branches: ["main"]
  pull_request:

jobs:
  pipeline-smoke-test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
      - name: Install dependencies
        run: pip install -r requirements.txt
      - name: Remove existing generated outputs
        run: rm -f data/demo.db data/titanic.csv reports/titanic_summary.csv
      - name: Run CSV pipeline
        run: python pipelines/01_ingest_to_sqlite.py
      - name: Verify generated outputs
        run: |
          test -f data/demo.db
          test -f reports/titanic_summary.csv
